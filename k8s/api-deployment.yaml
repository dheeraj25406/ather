apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aether
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: 660348065585.dkr.ecr.ap-south-1.amazonaws.com/aether:latest
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: DATABASE_URL
              value: postgresql+asyncpg://aether:aether_pass@postgres:5432/aether_db
            - name: QDRANT_URL
              value: http://qdrant:6333
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aether-secrets
                  key: openai-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: aether
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8000