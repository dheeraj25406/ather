version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aether_db
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped

  # # New sidecar container to pull the model automatically
  # ollama-pull-model:
  #   image: ollama/ollama:latest
  #   container_name: ollama-pull-model
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   entrypoint: /bin/sh
  #   command: -c "ollama serve & sleep 5 && ollama pull llama3" 
  #   depends_on:
  #     ollama:
  #       condition: service_healthy

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://aether:aether_pass@postgres:5432/aether_db
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - redis
      - postgres
      - qdrant
      # - ollama
    volumes:
      - .:/app # Added for local code reloading
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pg_data:
  qdrant_data:
  # ollama_data: # Persists downloaded models